# Example microsocks.conf (INI-style, simple key = value pairs)
# Supported keys:
#   quiet     = true|false   (whether to disable logging, overrides -q)
#   listen    = <ip>         (listen/bind address, e.g. 0.0.0.0)
#   port      = <port>       (TCP port to listen on)
#   database  = <path>       (path to SQLite DB file)
#   auth_fail_window_sec = <sec>      (failed auth window per client IP)
#   auth_fail_limit = <count>         (max failed auths per window)
#   connect_rate_window_sec = <sec>   (new connection window per client IP)
#   connect_rate_limit = <count>      (max connection attempts per window)
#   max_concurrent_per_account = <count> (0 disables cap)
#   connections_retention_days = <days>  (0 disables retention pruning)
#   metrics_listen = <ip>      (metrics/health HTTP bind addr, default 127.0.0.1)
#   metrics_port = <port>      (0 disables metrics endpoint)

# Example: non-quiet, listen on all interfaces, port 1080
quiet = false
listen = 0.0.0.0
port = 1080
# database = /var/lib/microsocks/microsocks.db
auth_fail_window_sec = 300
auth_fail_limit = 10
connect_rate_window_sec = 60
connect_rate_limit = 60
max_concurrent_per_account = 3
connections_retention_days = 90
metrics_listen = 127.0.0.1
metrics_port = 9108

# Notes:
# - CLI flags override values in this file.
# - Use the -f option to load an alternate config file path.
